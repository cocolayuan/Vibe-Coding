<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>方案A - 弹窗内扫描线</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    height: 100vh;
    overflow: hidden;
    background: #000;
    font-family: 'Roboto', "PingFang SC", sans-serif;
  }

  .player-bg {
    position: fixed;
    inset: 0;
    background: url('播放器底部背景.jpg') center/cover no-repeat;
  }

  .toast {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.8);
    padding: 28px 48px;
    border-radius: 16px;
    background: rgba(10, 10, 20, 0.75);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(100, 140, 255, 0.15);
    text-align: center;
    opacity: 0;
    overflow: hidden;
    animation: toastIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) 0.2s forwards,
               toastOut 0.4s ease-in 2.6s forwards;
    box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5), 0 0 60px rgba(80, 120, 255, 0.1);
  }

  @keyframes toastIn {
    0% { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
    100% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
  }

  @keyframes toastOut {
    0% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    100% { opacity: 0; transform: translate(-50%, -50%) scale(0.95) translateY(-10px); }
  }

  /* 弹窗内扫描线 */
  .toast-scanline {
    position: absolute;
    top: -2px;
    left: 0;
    width: 100%;
    height: 2px;
    background: linear-gradient(90deg, transparent, rgba(120, 180, 255, 0.8), transparent);
    box-shadow: 0 0 12px 2px rgba(100, 160, 255, 0.4);
    opacity: 0;
    animation: toastScan 1s ease-in-out 0.4s forwards;
    z-index: 10;
  }

  .toast-scanline:nth-child(2) {
    animation-delay: 1.2s;
    background: linear-gradient(90deg, transparent, rgba(160, 120, 255, 0.5), transparent);
    box-shadow: 0 0 8px 2px rgba(140, 100, 255, 0.3);
  }

  @keyframes toastScan {
    0% { top: -2px; opacity: 0; }
    10% { opacity: 1; }
    80% { opacity: 0.4; }
    100% { top: calc(100% + 2px); opacity: 0; }
  }

  /* 顶部光线 */
  .toast::before {
    content: '';
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 60%;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(120, 160, 255, 0.6), transparent);
    animation: shimmer 1.5s ease-in-out 0.4s forwards;
    opacity: 0;
  }

  @keyframes shimmer {
    0% { opacity: 0; width: 0; }
    50% { opacity: 1; }
    100% { opacity: 0.5; width: 60%; }
  }

  .line1 {
    font-weight: 700;
    font-size: 20px;
    color: rgba(220, 225, 255, 0.95);
    letter-spacing: 1.5px;
    opacity: 0;
    transform: translateY(-12px);
    animation: dropIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) 0.5s forwards;
    text-shadow: 0 0 20px rgba(100, 140, 255, 0.4);
  }

  .line2 {
    font-weight: 300;
    font-size: 13px;
    color: rgba(150, 165, 220, 0.75);
    letter-spacing: 3px;
    margin-top: 10px;
    opacity: 0;
    transform: translateY(-10px);
    animation: dropIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) 0.8s forwards;
    text-shadow: 0 0 12px rgba(120, 100, 255, 0.3);
  }

  @keyframes dropIn {
    0% { opacity: 0; transform: translateY(-12px); filter: blur(4px); }
    60% { filter: blur(0); }
    100% { opacity: 1; transform: translateY(0); filter: blur(0); }
  }

  .line-decoration {
    width: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(120, 140, 255, 0.4), transparent);
    margin: 14px auto 0;
    animation: expandLine 0.6s ease-out 1.1s forwards;
  }

  @keyframes expandLine { to { width: 120px; } }

  .pulse-dot {
    position: absolute;
    top: -4px;
    left: 50%;
    transform: translateX(-50%);
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: rgba(120, 160, 255, 0.8);
    opacity: 0;
    animation: pulseDot 0.4s ease-out 0.2s forwards;
    box-shadow: 0 0 12px 4px rgba(100, 140, 255, 0.4);
  }

  @keyframes pulseDot {
    0% { opacity: 0; transform: translateX(-50%) scale(0); }
    50% { opacity: 1; transform: translateX(-50%) scale(1.5); }
    100% { opacity: 0; transform: translateX(-50%) scale(0.5); }
  }
</style>
</head>
<body>
<div class="player-bg"></div>
<div class="toast">
  <div class="toast-scanline"></div>
  <div class="toast-scanline"></div>
  <div class="pulse-dot"></div>
  <div class="line1">Your Answer Has Been Received</div>
  <div class="line2">The World Line Has Changed</div>
  <div class="line-decoration"></div>
</div>
</body>
</html>
